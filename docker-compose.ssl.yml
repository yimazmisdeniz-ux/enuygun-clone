te# SSL/TLS reverse proxy for development — adds nginx with self-signed cert
# Run: docker-compose -f docker-compose.yml -f docker-compose.ssl.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: bookera-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - default

  # Override app's port exposure — nginx handles public traffic
  app:
    expose:
      - "3000"
    ports: []